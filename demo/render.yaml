services:
  - type: web
    name: paygate-demo
    runtime: node
    plan: free
    rootDir: demo
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: REGISTRY_ADDRESS
        value: 0x09A4b760Ea42325508fC6b9b6777CAb667071595
      - key: RPC_URL
        value: https://sepolia.base.org
      - key: FACILITATOR_URL
        value: https://www.x402.org/facilitator
      - key: PORT
        value: 10000
    autoDeploy: true
