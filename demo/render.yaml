services:
  - type: web
    name: paygate-demo
    runtime: node
    plan: free
    rootDir: demo
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: REGISTRY_ADDRESS
        value: 0xb4Da3B8300881E0d84f269D1Bc3BBc03839c242A
      - key: RPC_URL
        value: https://sepolia.base.org
      - key: FACILITATOR_URL
        value: https://www.x402.org/facilitator
      - key: PORT
        value: 10000
    autoDeploy: true
